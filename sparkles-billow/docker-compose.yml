version: "3.7"

services:
  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: sparkles-billow_server_1
      APP_PORT: 3000

  server:
    image: ghcr.io/chepetime/billow:v0.1.11
    init: true
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://billow:billow-password@db:5432/billow?schema=public
      # BetterAuth session secret. APP_SEED is Umbrel's per-install
      # deterministic secret (>=32 chars); without it the app throws at
      # startup. The base URL is inferred from the request, so no domain is
      # pinned here (works via umbrel.local / Tailscale / Cloudflare / IP).
      BETTER_AUTH_SECRET: ${APP_SEED}
    restart: on-failure

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: billow
      POSTGRES_USER: billow
      POSTGRES_PASSWORD: billow-password
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    restart: on-failure
